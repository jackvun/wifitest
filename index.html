<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>AMARAN WIFI</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: black;
    color: #00FF00;
    font-family: 'Courier New', Courier, monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

.box {
    max-width: 800px;
    padding: 20px;
    border: 2px solid #00FF00;
    box-shadow: 0 0 20px #00FF00;
}

h1 {
    font-size: 42px;
    text-shadow: 0 0 10px #00FF00;
}

button {
    padding: 20px 35px;
    font-size: 24px;
    border: 3px solid #00FF00;
    background: black;
    color: #00FF00;
    cursor: pointer;
}

/* GIF animation */
#thankGif {
    display: none;
    width: 320px;
    margin-top: 20px;
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.6s ease;
}

#thankGif.show {
    display: block;
    opacity: 1;
    transform: scale(1);
}
</style>
</head>

<body>

<div class="box">
    <h1>⚠️ AMARAN KERAS ⚠️</h1>

    <p>Jika anda faham, tekan butang di bawah:</p>

    <button onclick="acknowledge()">YA, SAYA FAHAM</button>

    <!-- GUNA GIF KAU SENDIRI -->
    <img id="thankGif" src="hacker.gif">

    <p>— Dari VUN</p>
</div>

<audio id="thankAudio">
    <source src="sound.mp3" type="audio/mpeg">
</audio>

<script>
function acknowledge() {
    // play audio
    const audio = document.getElementById('thankAudio');
    audio.currentTime = 0;
    audio.play().catch(err => console.log(err));

    // show gif dengan animation
    const gif = document.getElementById('thankGif');
    gif.classList.add("show");

    // tukar text
    document.querySelector('h1').innerHTML = "✔️ ACCESS GRANTED";
}
</script>

</body>
</html>
